<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Open Graph -->
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title"
    content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
<meta property="og:description"
    content="{% if page.description %}{{ page.description | escape }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncate: 200 | escape }}{% else %}{{ site.description | strip_newlines | strip | escape }}{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image"
    content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ '/assets/images/profile.jpg' | absolute_url }}{% endif %}">
{% if page.layout == 'post' %}
<meta property="og:type" content="article">
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author" content="Gunnar Griese">
{% if page.tags %}
<meta property="article:tag" content="{{ page.tags | join: ', ' }}">{% endif %}
{% else %}
<meta property="og:type" content="website">
{% endif %}
