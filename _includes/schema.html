<!-- WebSite Schema (all pages) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title }}",
  "url": "{{ site.url }}",
  "description": "{{ site.description | strip_newlines | strip }}",
  "author": {
    "@type": "Person",
    "name": "Gunnar Griese"
  }
}
</script>

{% if page.layout == 'home' %}
<!-- Person Schema (homepage) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Gunnar Griese",
  "url": "{{ site.url }}",
  "image": "{{ '/assets/images/profile.jpg' | absolute_url }}",
  "jobTitle": "Independent Measurement Practitioner",
  "description": "{{ site.description | strip_newlines | strip }}",
  "email": "{{ site.email }}",
  "sameAs": [
    "https://linkedin.com/in/{{ site.linkedin_username }}",
    "https://github.com/{{ site.github_username }}"
  ],
  "worksFor": {
    "@type": "Organization",
    "name": "8-bit-sheep"
  },
  "alumniOf": {
    "@type": "EducationalOrganization",
    "name": "IHM Business School"
  },
  "hasCredential": {
    "@type": "EducationalOccupationalCredential",
    "name": "Google Cloud Certified Professional Data Engineer"
  },
  "knowsAbout": [
    "Signal Engineering",
    "Measurement Infrastructure",
    "Google Analytics",
    "Google Tag Manager",
    "Server-Side Tagging",
    "Google Cloud Platform",
    "BigQuery",
    "Dataform",
    "Data Engineering",
    "Marketing Measurement"
  ]
}
</script>
{% endif %}

{% if page.layout == 'post' %}
<!-- BlogPosting Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title | escape }}",
  "description": "{% if page.description %}{{ page.description | escape }}{% else %}{{ page.excerpt | strip_html | truncate: 160 | escape }}{% endif %}",
  "url": "{{ page.url | absolute_url }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{% if page.last_modified_at %}{{ page.last_modified_at | date_to_xmlschema }}{% else %}{{ page.date | date_to_xmlschema }}{% endif %}",
  {% if page.image %}"image": "{{ page.image | absolute_url }}",{% endif %}
  "wordCount": "{{ page.content | number_of_words }}",
  "author": {
    "@type": "Person",
    "name": "Gunnar Griese",
    "url": "{{ site.url }}",
    "jobTitle": "Independent Measurement Practitioner",
    "hasCredential": {
      "@type": "EducationalOccupationalCredential",
      "name": "Google Cloud Certified Professional Data Engineer"
    },
    "knowsAbout": [
      "Signal Engineering",
      "Measurement Infrastructure",
      "Google Analytics",
      "Google Tag Manager",
      "Server-Side Tagging",
      "Google Cloud Platform",
      "BigQuery",
      "Dataform",
      "Data Engineering",
      "Marketing Measurement"
    ]
  },
  "publisher": {
    "@type": "Person",
    "name": "Gunnar Griese",
    "url": "{{ site.url }}",
    "image": "{{ '/assets/images/profile.jpg' | absolute_url }}"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  }{% if page.tags %},
  "keywords": "{{ page.tags | join: ', ' }}"{% endif %}
}
</script>
{% endif %}

{% if page.url == '/services/' %}
<!-- ProfessionalService Schema with Reviews -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Gunnar Griese - Signal Engineering & Measurement Infrastructure",
  "url": "{{ '/services/' | absolute_url }}",
  "description": "Independent measurement practitioner specializing in Signal Engineering, server-side tracking, warehouse-native pipelines, and measurement infrastructure for marketing, MarTech, and analytics teams.",
  "provider": {
    "@type": "Person",
    "name": "Gunnar Griese",
    "url": "{{ site.url }}",
    "jobTitle": "Independent Measurement Practitioner"
  },
  "areaServed": "Worldwide",
  "review": [{% for testimonial in site.data.testimonials %}
    {
      "@type": "Review",
      "author": {
        "@type": "Person",
        "name": "{{ testimonial.name }}",
        "jobTitle": "{{ testimonial.title }}",
        "worksFor": {
          "@type": "Organization",
          "name": "{{ testimonial.company }}"
        }
      },
      "reviewBody": "{{ testimonial.quote | escape }}"
    }{% unless forloop.last %},{% endunless %}{% endfor %}
  ]
}
</script>
{% endif %}

{% if page.url == '/contact/' %}
<!-- FAQPage Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What's the typical engagement?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Most engagements are project-based, 2-12 weeks, fixed scope. Retainer arrangements are routed through 8-bit-sheep for continuity and contracting. Training and workshops are scheduled separately."
      }
    },
    {
      "@type": "Question",
      "name": "How embedded is \"embedded\"?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "As embedded as your team allows. I prefer working in your Slack, your ticket system, and your repo, joining standups and design reviews where useful. The Forward Deployed Engineer model is core to how I deliver."
      }
    },
    {
      "@type": "Question",
      "name": "What if our stack isn't Google?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The methodology travels. Signal Engineering applies whether the warehouse is BigQuery, Snowflake, or Redshift, and whether the analytics platform is GA4, Amplitude, or something else. The Google stack is where I have the deepest production experience, but the way I think about measurement isn't tool-specific."
      }
    },
    {
      "@type": "Question",
      "name": "How quickly can we start?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "1-4 weeks for new projects, depending on scope and current capacity. Audits and short engagements are sometimes possible faster."
      }
    },
    {
      "@type": "Question",
      "name": "What happens after the engagement ends?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The deliverable is always something your team can run without me — documented contracts, code in your repo, and a working knowledge transfer. Many clients move from a project to retainer support; others run the system themselves and I'm available for spot questions."
      }
    }
  ]
}
</script>
{% endif %}
